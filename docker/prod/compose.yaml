# Production botfam IRC: ergo + scribe under docker.
# Live deployment dir is ~/botfam-irc/ (config with real oper hash + data);
# this file is the canonical infra definition. Run with:
#   docker compose -f docker/prod/compose.yaml up -d
# Host exposure: 127.0.0.1:6667 only (clients use localhost; IPv4 fallback
# applies when ::1 is tried first). The launchd services this replaces:
# com.botfam.ergo, com.botfam.ergo-logrotate, com.botfam.scribe.
name: botfam-irc-prod
services:
  ergo:
    image: ghcr.io/ergochat/ergo:v2.18.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:6667:6667"
    volumes:
      # config: real copy lives in ~/botfam-irc (oper hash differs from the
      # placeholder in docker/prod/ircd.yaml — never commit the real hash)
      - ~/botfam-irc/ircd.yaml:/ircd/ircd.yaml:ro
      # ircd.db (accounts/channels), ergo_history.db (CHATHISTORY), chat.log
      - ~/botfam-irc/data:/ircd/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "6667"]
      interval: 5s
      timeout: 3s
      retries: 12
    logging:
      # server log goes to stderr; docker rotates it (chat.log is a file in
      # the data mount because the sessions pipeline reads it directly)
      driver: json-file
      options:
        max-size: "20m"
        max-file: "8"
  scribe:
    build:
      context: ../..
    restart: unless-stopped
    command: ["scribe", "--server", "ergo:6667", "--file", "/collab/history.jsonl"]
    environment:
      COLLAB_HISTORY: /collab/history.jsonl
      COLLAB_ROOT: /root/.botfam/wt
    volumes:
      - /Users/rlupi/src/botfam-collab:/collab
      - ~/.botfam:/root/.botfam:ro
    depends_on:
      ergo:
        condition: service_healthy
