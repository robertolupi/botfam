# Hermetic IRC substrate for integration tests: ergo + scribe on a private
# network. Run via docker/test-substrate.sh. Host exposure is limited to
# 127.0.0.1:16667 (never 6667 — that's the production ergo).
name: botfam-test
services:
  botfam-irc:
    build: docker/botfam-irc
    ports:
      - "127.0.0.1:16667:6667"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "6667"]
      interval: 2s
      timeout: 2s
      retries: 15
  scribe:
    build: .
    command: ["scribe", "--server", "botfam-irc:6667", "--file", "/data/history.jsonl"]
    environment:
      # scribe resolves COLLAB_HISTORY/family-root BEFORE parsing --file and
      # errors out if neither exists (internal/fam/scribe.go); the env var
      # short-circuits that check, then --file still takes precedence.
      COLLAB_HISTORY: /data/history.jsonl
    depends_on:
      botfam-irc:
        condition: service_healthy
    volumes:
      - scribe-data:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config", "/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    tmpfs:
      - /tmp

  forgejo:
    image: codeberg.org/forgejo/forgejo:9
    ports:
      - "127.0.0.1:13000:3000"
      - "127.0.0.1:12222:22"
    environment:
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "3000"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - forgejo-data:/data

volumes:
  scribe-data:
  forgejo-data:
